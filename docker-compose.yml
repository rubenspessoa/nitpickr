services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nitpickr
      POSTGRES_USER: nitpickr
      POSTGRES_PASSWORD: nitpickr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nitpickr -d nitpickr"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["node", "dist/src/cli/index.js", "migrate"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["node", "dist/src/api/index.js"]
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["node", "dist/src/worker/index.js"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
